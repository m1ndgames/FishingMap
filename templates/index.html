<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FishingMap</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; height: 100vh; overflow: hidden; }
    #map { position: absolute; inset: 0; }

    .depth-popup { font-size: .82rem; padding: 2px 2px; }

    /* Map tools control (base layer / overlay / ruler / compass) — bottom-right rail */
    .maplibregl-ctrl-group button {
      display: flex; align-items: center; justify-content: center;
    }
    .maplibregl-ctrl-group button.active { background: #e0f2fe; color: #0369a1; }
    .compass-needle { transform-origin: 12px 12px; transition: transform .1s linear; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
// ── Constants ──────────────────────────────────────────────────────────────
const POLL_MS    = 5 * 60 * 1000;
const DEPTH_MIN  = 15;   // minimum zoom for depth overlay (max is 18, set on the source below)

// ── Map ────────────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      osm: {
        type: 'raster',
        tiles: [
          'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',
          'https://b.tile.openstreetmap.org/{z}/{x}/{y}.png',
          'https://c.tile.openstreetmap.org/{z}/{x}/{y}.png',
        ],
        tileSize: 256,
        maxzoom: 19,
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      },
      satellite: {
        type: 'raster',
        // ESRI World Imagery — tile URL uses {z}/{y}/{x} row/col order
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256,
        maxzoom: 19,
        attribution: 'Satellite: Esri, Maxar, Earthstar Geographics',
      },
      water: {
        type: 'raster',
        tiles: [`${location.origin}/tiles/water/{z}/{x}/{y}.png?v=init`],
        tileSize: 256,
        minzoom: DEPTH_MIN,
        maxzoom: 18,
        bounds: [6.39, 50.72, 7.12, 51.77],   // Rhine Bonn→Wesel corridor
        attribution: 'Water extent: DTM © IT.NRW · BfG Rhine DEM',
      },
      depth: {
        type: 'raster',
        tiles: [`${location.origin}/tiles/depth/{z}/{x}/{y}.png?v=init`],
        tileSize: 256,
        minzoom: DEPTH_MIN,
        maxzoom: 18,
        bounds: [6.39, 50.72, 7.12, 51.77],
        attribution: 'Bathymetry: DTM © IT.NRW · BfG Rhine DEM',
      },
    },
    layers: [
      { id: 'osm-layer',       type: 'raster', source: 'osm' },
      { id: 'satellite-layer', type: 'raster', source: 'satellite',
        layout: { visibility: 'none' } },
      { id: 'water-layer', type: 'raster', source: 'water',
        minzoom: DEPTH_MIN,
        layout: { visibility: 'none' },   // water extent overlay disabled by default
        paint: { 'raster-opacity': 0.75 } },
      { id: 'depth-layer', type: 'raster', source: 'depth',
        minzoom: DEPTH_MIN,
        paint: { 'raster-opacity': 1 } },
    ],
  },
  center: [6.7735, 51.2277],
  zoom: 13,
});

map.addControl(new maplibregl.NavigationControl(), 'bottom-right');
map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');

// ── Geolocation ────────────────────────────────────────────────────────────
const geolocate = new maplibregl.GeolocateControl({
  positionOptions: { enableHighAccuracy: true },
  trackUserLocation: true,
  showUserLocation: true,
});
map.addControl(geolocate, 'bottom-right');
geolocate.on('error', (e) => console.warn('[geolocate]', e && e.message ? e.message : e));

// ── Map tools control (base layer / overlay / ruler / compass) ─────────────
function createMapToolsControl(buttons) {
  return {
    onAdd() {
      const container = document.createElement('div');
      container.className = 'maplibregl-ctrl maplibregl-ctrl-group';
      for (const b of buttons) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.title = b.title;
        btn.innerHTML = b.svg;
        btn.addEventListener('click', () => b.onClick());
        container.appendChild(btn);
        b.el = btn;
      }
      this._container = container;
      return container;
    },
    onRemove() {
      this._container.parentNode?.removeChild(this._container);
    },
  };
}

const ICON_LAYERS = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12,3 21,9 12,15 3,9"/><polyline points="3,13 12,19 21,13"/><polyline points="3,17 12,23 21,17"/></svg>`;
const ICON_WAVES  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 8c2 0 2-3 4-3s2 3 4 3 2-3 4-3 2 3 4 3 2-3 4-3"/><path d="M2 14c2 0 2-3 4-3s2 3 4 3 2-3 4-3 2 3 4 3 2-3 4-3"/><path d="M2 20c2 0 2-3 4-3s2 3 4 3 2-3 4-3 2 3 4 3 2-3 4-3"/></svg>`;
const ICON_RULER  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="8" width="20" height="8" rx="1" transform="rotate(-25 12 12)"/><path d="M6 9l1.5 2M10 8l1.5 2M14 7l1.5 2M18 6l1.5 2" transform="rotate(-25 12 12)"/></svg>`;
const ICON_COMPASS = `<svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><g class="compass-needle"><polygon points="12,5 15,12 12,19 9,12" fill="currentColor"/></g></svg>`;

const layerBtn   = { title: 'Switch base layer',  svg: ICON_LAYERS,  onClick: () => onLayerToggle() };
const overlayBtn = { title: 'Toggle depth overlay', svg: ICON_WAVES, onClick: () => onOverlayToggle() };
const rulerBtn   = { title: 'Measure distance',   svg: ICON_RULER,   onClick: () => onRulerToggle() };
const compassBtn = { title: 'Compass mode',       svg: ICON_COMPASS, onClick: () => onCompassToggle() };

map.addControl(createMapToolsControl([layerBtn, overlayBtn, rulerBtn, compassBtn]), 'bottom-right');
overlayBtn.el.classList.add('active');   // depth overlay is on by default

// ── Click-to-query depth ──────────────────────────────────────────────────
const depthPopup = new maplibregl.Popup({ closeButton: true, maxWidth: '220px' });
let depthRequestId = 0;

map.on('click', async (e) => {
  if (rulerActive) return;
  const requestId = ++depthRequestId;
  const { lng, lat } = e.lngLat;

  let data;
  try {
    const r = await fetch(`/api/depth?lat=${lat}&lon=${lng}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
  } catch (err) {
    console.warn('[depth] fetch failed:', err);
    return;
  }

  if (requestId !== depthRequestId) return;   // a newer click superseded this one
  if (!data.underwater) {
    depthPopup.remove();
    return;
  }
  depthPopup.setLngLat(e.lngLat)
    .setHTML(`<div class="depth-popup">Water depth: ${data.depth_m.toFixed(1)} m</div>`)
    .addTo(map);
});

// ── Overlay toggle ─────────────────────────────────────────────────────────
let overlayOn = true;
function onOverlayToggle() {
  overlayOn = !overlayOn;
  map.setLayoutProperty('depth-layer', 'visibility', overlayOn ? 'visible' : 'none');
  overlayBtn.el.classList.toggle('active', overlayOn);
}

// ── Base layer toggle ──────────────────────────────────────────────────────
let currentBaseLayer = 'osm';
function setBaseLayer(id) {
  map.setLayoutProperty('osm-layer',       'visibility', id === 'osm' ? 'visible' : 'none');
  map.setLayoutProperty('satellite-layer', 'visibility', id === 'sat' ? 'visible' : 'none');
  currentBaseLayer = id;
}
function onLayerToggle() {
  setBaseLayer(currentBaseLayer === 'osm' ? 'sat' : 'osm');
}

// ── Ruler ──────────────────────────────────────────────────────────────────
function haversineMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = (deg) => deg * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const s = Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

function formatDistance(meters) {
  return meters < 1000 ? `${Math.round(meters)} m` : `${(meters / 1000).toFixed(2)} km`;
}

const rulerPopup = new maplibregl.Popup({ closeButton: false, closeOnClick: false });
let rulerActive = false;
let markerA = null;
let markerB = null;

function resetRuler() {
  if (markerA) { markerA.remove(); markerA = null; }
  if (markerB) { markerB.remove(); markerB = null; }
  rulerPopup.remove();
  map.getSource('ruler-line')?.setData({ type: 'FeatureCollection', features: [] });
}

function updateRulerLine(a, b) {
  map.getSource('ruler-line')?.setData({
    type: 'FeatureCollection',
    features: [{
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: [[a.lng, a.lat], [b.lng, b.lat]] },
      properties: {},
    }],
  });
}

function showRulerDistance(a, b) {
  const meters = haversineMeters(a.lat, a.lng, b.lat, b.lng);
  const mid = [(a.lng + b.lng) / 2, (a.lat + b.lat) / 2];
  rulerPopup.setLngLat(mid)
    .setHTML(`<div class="depth-popup">${formatDistance(meters)}</div>`)
    .addTo(map);
}

function onRulerToggle() {
  rulerActive = !rulerActive;
  rulerBtn.el.classList.toggle('active', rulerActive);
  map.getCanvas().style.cursor = rulerActive ? 'crosshair' : '';
  resetRuler();
}

map.on('click', (e) => {
  if (!rulerActive) return;
  if (markerA && markerB) resetRuler();   // 3rd click starts a new measurement

  if (!markerA) {
    markerA = new maplibregl.Marker().setLngLat(e.lngLat).addTo(map);
    return;
  }
  markerB = new maplibregl.Marker().setLngLat(e.lngLat).addTo(map);
  const a = markerA.getLngLat();
  const b = markerB.getLngLat();
  updateRulerLine(a, b);
  showRulerDistance(a, b);
});

map.on('mousemove', (e) => {
  if (!rulerActive || !markerA || markerB) return;
  const a = markerA.getLngLat();
  updateRulerLine(a, e.lngLat);
  showRulerDistance(a, e.lngLat);
});

// ── Compass mode ───────────────────────────────────────────────────────────
const compassNeedle = compassBtn.el.querySelector('.compass-needle');
let compassActive = false;
let smoothedHeading = 0;
let compassEventName = null;   // 'deviceorientationabsolute' | 'deviceorientation'
let compassListener = null;

function shortestAngleDelta(from, to) {
  return ((((to - from) % 360) + 540) % 360) - 180;
}

function extractHeading(event) {
  if (typeof event.webkitCompassHeading === 'number') {
    return event.webkitCompassHeading;   // iOS Safari: already true-north-referenced
  }
  if (typeof event.alpha === 'number') {
    const screenAngle = (screen.orientation && screen.orientation.angle) || window.orientation || 0;
    return (360 - event.alpha - screenAngle + 360) % 360;
  }
  return null;
}

function onDeviceOrientation(event) {
  const heading = extractHeading(event);
  if (heading === null) return;
  smoothedHeading = (smoothedHeading + shortestAngleDelta(smoothedHeading, heading) * 0.15 + 360) % 360;
  map.setBearing(smoothedHeading);
  compassNeedle.style.transform = `rotate(${smoothedHeading}deg)`;
}

async function enableCompassMode() {
  if (typeof window.DeviceOrientationEvent === 'undefined') {
    console.warn('[compass] DeviceOrientationEvent not supported on this browser/context');
    return false;
  }
  if (typeof window.DeviceOrientationEvent.requestPermission === 'function') {
    let result;
    try {
      result = await window.DeviceOrientationEvent.requestPermission();
    } catch (err) {
      console.warn('[compass] permission request failed:', err);
      return false;
    }
    if (result !== 'granted') {
      console.warn('[compass] permission denied by user');
      return false;
    }
  }

  compassEventName = 'ondeviceorientationabsolute' in window ? 'deviceorientationabsolute' : 'deviceorientation';
  compassListener = onDeviceOrientation;
  window.addEventListener(compassEventName, compassListener);
  map.dragRotate.disable();
  map.touchZoomRotate.disableRotation();
  return true;
}

function disableCompassMode() {
  if (compassListener) {
    window.removeEventListener(compassEventName, compassListener);
    compassListener = null;
    compassEventName = null;
  }
  map.dragRotate.enable();
  map.touchZoomRotate.enableRotation();
  map.easeTo({ bearing: 0, pitch: 0, duration: 300 });
  compassNeedle.style.transform = 'rotate(0deg)';
}

async function onCompassToggle() {
  if (!compassActive) {
    const ok = await enableCompassMode();
    if (!ok) return;
    compassActive = true;
    smoothedHeading = map.getBearing();   // seed from current bearing, avoid a visible jump
    compassBtn.el.classList.add('active');
  } else {
    disableCompassMode();
    compassActive = false;
    compassBtn.el.classList.remove('active');
  }
}

// ── Overlay tile refresh ───────────────────────────────────────────────────
let currentProfileKey = 'init';

function refreshOverlayTiles(profileKey) {
  currentProfileKey = profileKey;
  map.getSource('water').setTiles([`${location.origin}/tiles/water/{z}/{x}/{y}.png?v=${profileKey}`]);
  map.getSource('depth').setTiles([`${location.origin}/tiles/depth/{z}/{x}/{y}.png?v=${profileKey}`]);
}

// ── PEGELONLINE polling ────────────────────────────────────────────────────
// No visible gauge display anymore — this just keeps the depth/water tile
// URLs in sync with the live water level (profile_key changes every ~5 min).
async function fetchWaterLevel() {
  let data;
  try {
    const r = await fetch('/api/waterlevel');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
  } catch (err) {
    console.warn('[pegelonline] fetch failed:', err);
    return;
  }

  if (data.profile_key !== currentProfileKey) {
    refreshOverlayTiles(data.profile_key);
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
map.on('load', () => {
  map.addSource('ruler-line', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
  map.addLayer({
    id: 'ruler-line-layer',
    type: 'line',
    source: 'ruler-line',
    paint: { 'line-color': '#38bdf8', 'line-width': 2, 'line-dasharray': [2, 2] },
  });

  fetchWaterLevel();
  setInterval(fetchWaterLevel, POLL_MS);
  geolocate.trigger();
});
</script>
</body>
</html>
